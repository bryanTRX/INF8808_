<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#121212"/>
  <!-- Equalizer bars (heights vary to suggest a waveform) -->
  <rect x="4"  y="18" width="4" height="10" rx="2" fill="#1db954"/>
  <rect x="10" y="10" width="4" height="18" rx="2" fill="#1db954"/>
  <rect x="16" y="5"  width="4" height="23" rx="2" fill="#1ed760"/>
  <rect x="22" y="13" width="4" height="15" rx="2" fill="#1db954"/>
  <!-- Small dot accent at top of tallest bar -->
  <circle cx="18" cy="3.5" r="2" fill="#1ed760"/>
</svg>
