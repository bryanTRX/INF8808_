<div class="app-shell">
  <aside class="sidebar">
    <a href="#" class="brand" (click)="scrollTo('dashboard', $event)">
      <span class="brand-icon" aria-hidden="true">
        <img src="favicon.png" [attr.alt]="strings.logoAlt" class="brand-logo" />
      </span>
      <span class="brand-text">
        <span class="brand-title">MusicInsights</span>
        <span class="brand-eyebrow">{{ strings.projectLabel }}</span>
      </span>
    </a>

    <nav class="sidebar-nav" [attr.aria-label]="strings.navAria">
      <button type="button" data-anchor="dashboard" class="nav-item" [class.is-active]="activeAnchor === 'dashboard'" (click)="scrollTo('dashboard')">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        {{ strings.navHome }}
      </button>
      <span class="nav-section">{{ strings.navVisualizations }}</span>
      @for (viz of catalog; track viz.id) {
        <button type="button" [attr.data-anchor]="viz.anchor" class="nav-item" [class.is-active]="activeAnchor === viz.anchor" (click)="scrollTo(viz.anchor)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 5 5-9"/></svg>
          {{ viz.title }}
        </button>
      }
    </nav>

  </aside>

  <div class="app-body">
    <header class="topbar">
      <div class="topbar-actions">
        <button type="button" class="icon-btn theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme() === 'dark' ? strings.themeLight : strings.themeDark">
          @if (theme() === 'dark') {
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          } @else {
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          }
        </button>
      </div>
    </header>

    <main #mainScroll class="app-main" (scroll)="onMainScroll()"><router-outlet /></main>
  </div>
</div>
