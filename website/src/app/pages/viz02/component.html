<section class="viz-page">
  <p class="status">{{ loadState.status() }}</p>

  <div class="controls" style="flex-direction:column;align-items:flex-start;gap:0.75rem">

    <!-- Top N filter -->
    <div class="control-group" style="align-items:center;gap:0.5rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0;margin-right:0.15rem">
        {{ langService.lang() === 'fr' ? 'Afficher' : 'Show' }}
      </span>
      @for (n of topNOptions; track n) {
        <button
          type="button"
          [class.active]="topN === n"
          (click)="setTopN(n)">
          Top {{ n }}
        </button>
      }
    </div>

    <!-- Sort order -->
    <div class="control-group" style="align-items:center;gap:0.5rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0;margin-right:0.15rem">
        {{ langService.lang() === 'fr' ? 'Tri' : 'Sort' }}
      </span>
      <button
        type="button"
        [class.active]="sortOrder === 'asc'"
        (click)="setSortOrder('asc')">
        {{ langService.lang() === 'fr' ? '↑ Croissant' : '↑ Ascending' }}
      </button>
      <button
        type="button"
        [class.active]="sortOrder === 'desc'"
        (click)="setSortOrder('desc')">
        {{ langService.lang() === 'fr' ? '↓ Décroissant' : '↓ Descending' }}
      </button>
      <button
        type="button"
        [class.active]="sortOrder === 'alpha'"
        (click)="setSortOrder('alpha')">
        A – Z
      </button>
    </div>

  </div>

  <div #chart class="chart-container" style="min-height:480px;height:auto">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
