<section class="viz-page">
  <p class="status">{{ loadState.status() }}</p>

  <div class="controls" style="flex-direction:column;align-items:flex-start;gap:0.75rem">

    <!-- Genre chip checkboxes -->
    <div class="control-group" style="flex-wrap:wrap;align-items:center;gap:0.4rem 0.6rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0;margin-right:0.25rem">
        Genres
      </span>
      @for (g of genres; track g) {
        <label class="chip-label">
          <input
            type="checkbox"
            [checked]="isSelected(g)"
            (change)="toggleGenre(g, $any($event.target).checked)"
            style="display:none">
          {{ genreLabels[g] }}
        </label>
      }
    </div>

    <!-- Shared axes + reset -->
    <div class="control-group" style="flex-wrap:wrap;align-items:center;gap:0.75rem 1.25rem">

      <label class="chip-label" style="cursor:pointer">
        <input
          type="checkbox"
          [(ngModel)]="sharedScales"
          (ngModelChange)="refresh()"
          style="display:none">
        Shared axes
      </label>

      <button type="button" (click)="reset()">
        Reset
      </button>

    </div>
  </div>

  <div #chart class="chart-container" style="min-height:560px;height:auto">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
