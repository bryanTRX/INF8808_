<section class="viz-page">
  <p class="status">{{ loadState.status() }}</p>

  <!-- Summary answer card -->
  @if (answerHeadline()) {
    <div class="answer-card">
      <p class="answer-headline">{{ answerHeadline() }}</p>
      <p class="answer-body">{{ answerBody() }}</p>
    </div>
  }

  <!-- Stats row -->
  @if (stats.length) {
    <div class="side-panel stats-row" style="margin-bottom:1rem">
      @for (s of stats; track s.label) {
        <div class="metric-card">
          <div class="stat-label">{{ s.label }}</div>
          <div class="stat-value">{{ s.value }}</div>
          <div class="stat-hint">{{ s.hint }}</div>
        </div>
      }
    </div>
  }

  <!-- Controls -->
  <div class="controls" style="flex-wrap:wrap;gap:0.5rem 0.75rem;align-items:center">

    <label class="chip-label" style="cursor:pointer">
      <input type="checkbox" [checked]="showCounts" (change)="toggleCounts()" style="display:none">
      {{ langService.lang() === 'fr' ? 'Afficher les comptes' : 'Show song counts' }}
    </label>

    <button type="button" (click)="reset()">
      {{ langService.lang() === 'fr' ? 'Réinitialiser' : 'Reset' }}
    </button>

  </div>

  <!-- Hover info panel -->
  <div class="hover-panel" [class.active]="!!hoverHtml"
    [innerHTML]="hoverHtml || (langService.lang() === 'fr'
      ? 'Survolez une barre pour voir la popularité moyenne pour cette durée.'
      : 'Hover a bar to see average popularity for that length range.')">
  </div>

  <div #chart class="chart-container">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
