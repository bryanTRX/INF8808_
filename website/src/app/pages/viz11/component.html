<section class="viz-page">
  <p class="status">{{ loadState.status() }}</p>

  <div class="controls" style="flex-wrap:wrap;gap:0.5rem 1.25rem;align-items:center">

    <!-- Artist selector -->
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">
        {{ ui.artistLabel }}
      </span>
      <select [(ngModel)]="selectedArtist" (ngModelChange)="onArtistChange()">
        @for (a of artists; track a.name) {
          <option [value]="a.name">{{ a.name }} ({{ a.trackCount }})</option>
        }
      </select>
    </div>

    <!-- Track selector -->
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">
        {{ ui.trackLabel }}
      </span>
      <select [(ngModel)]="selectedTrackId" (ngModelChange)="refresh()">
        @for (t of tracksForArtist; track t.trackId) {
          <option [value]="t.trackId">{{ t.title }} ({{ t.popularity }})</option>
        }
      </select>
    </div>

    <!-- Min popularity threshold -->
    <div style="display:flex;align-items:center;gap:0.5rem">
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">
        {{ ui.threshold }}
      </span>
      <input type="range" min="0" max="80" step="5"
        [(ngModel)]="minPop"
        (ngModelChange)="refresh()"
        style="width:90px;accent-color:var(--accent)">
      <span style="font-size:0.88rem;font-weight:600;color:var(--accent);min-width:1.8rem">{{ minPop }}</span>
    </div>

  </div>

  <div #chart class="chart-container" style="min-height:380px;height:auto">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
