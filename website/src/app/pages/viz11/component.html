<section class="viz-page">
  <header>
    <h1>{{ pageTitle() }}</h1>
    <p class="subtitle">{{ pageSubtitle() }}</p>
  </header>
  <p class="status">{{ loadState.status() }}</p>
  <div class="controls">
    @for (f of featureEntries(); track f.key) {
      <button type="button" [class.active]="feature === f.key" (click)="feature = f.key; onFeatureChange()">{{ f.label }}</button>
    }
  </div>
  <div #chart class="chart-container">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
