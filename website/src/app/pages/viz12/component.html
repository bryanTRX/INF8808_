<section class="viz-page">
  <p class="status">{{ loadState.status() }}</p>
  <div class="controls">
    <label>View
      <select [(ngModel)]="groupBy" (ngModelChange)="refresh()">
        <option value="none">All together</option>
        <option value="explicit">Explicit / Clean</option>
        <option value="genre">By genre</option>
      </select>
    </label>
    <label>Sample {{ sampleSize }}
      <input type="range" min="500" max="5000" step="250" [(ngModel)]="sampleSize" (ngModelChange)="refresh()" />
    </label>
    <label>Search
      <input type="text" [(ngModel)]="search" (ngModelChange)="refresh()" placeholder="Track or artist" />
    </label>
    <button type="button" (click)="reset()">Reset</button>
  </div>
  <div #chart class="chart-container" style="min-height:500px">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
