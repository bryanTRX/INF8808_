<section class="viz-page">
  <header>
    <h1>Popularité des titres — essaim de points</h1>
    <p class="subtitle">Comment se distribue la popularité Spotify ? Chaque point = un titre · Position = score de popularité · Couleur = genre.</p>
  </header>
  <p class="status">{{ loadState.status() }}</p>
  <div class="controls">
    <label>Vue
      <select [(ngModel)]="groupBy" (ngModelChange)="refresh()">
        <option value="none">Tous ensemble</option>
        <option value="genre">Par genre</option>
      </select>
    </label>
    <label>Échantillon {{ sampleSize }}
      <input type="range" min="500" max="5000" step="250" [(ngModel)]="sampleSize" (ngModelChange)="refresh()" />
    </label>
    <label>Recherche <input type="text" [(ngModel)]="search" (ngModelChange)="refresh()" placeholder="Titre ou artiste" /></label>
    <button type="button" (click)="reset()">Réinitialiser</button>
  </div>
  <div #chart class="chart-container" style="min-height: 500px">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
