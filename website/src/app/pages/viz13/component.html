<section class="viz-page">
  <header>
    <h1>Nuage de points libre</h1>
    <p class="subtitle">Explorez la relation entre deux caractéristiques audio quelconques. Chaque point = un titre · Couleur = genre · Ligne verte = tendance.</p>
  </header>
  <p class="status">{{ loadState.status() }}</p>
  <div class="controls">
    <label>Axe X
      <select [(ngModel)]="xAxis" (ngModelChange)="refresh()">
        @for (a of axes; track a.key) {
          <option [value]="a.key">{{ a.label }}</option>
        }
      </select>
    </label>
    <label>Axe Y
      <select [(ngModel)]="yAxis" (ngModelChange)="refresh()">
        @for (a of axes; track a.key) {
          <option [value]="a.key">{{ a.label }}</option>
        }
      </select>
    </label>
    <label>Échantillon {{ sampleSize }}
      <input type="range" min="500" max="5000" step="250" [(ngModel)]="sampleSize" (ngModelChange)="refresh()" />
    </label>
    <label><input type="checkbox" [(ngModel)]="showTrend" (ngModelChange)="refresh()" /> Afficher tendance</label>
    <label>Recherche <input type="text" [(ngModel)]="search" (ngModelChange)="refresh()" placeholder="Titre ou artiste" /></label>
  </div>
  <div #chart class="chart-container">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
