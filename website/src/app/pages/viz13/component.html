<section class="viz-page">
  <header>
    <h1>Free Scatter Plot</h1>
    <p class="subtitle">Explore the relationship between any two audio features. Each dot represents one track, colored by genre. The green line shows the overall trend.</p>
  </header>
  <p class="status">{{ loadState.status() }}</p>
  <div class="controls">
    <label>X Axis
      <select [(ngModel)]="xAxis" (ngModelChange)="refresh()">
        @for (a of axes(); track a.key) {
          <option [value]="a.key">{{ a.label }}</option>
        }
      </select>
    </label>
    <label>Y Axis
      <select [(ngModel)]="yAxis" (ngModelChange)="refresh()">
        @for (a of axes(); track a.key) {
          <option [value]="a.key">{{ a.label }}</option>
        }
      </select>
    </label>
    <label>Sample {{ sampleSize }}
      <input type="range" min="500" max="5000" step="250" [(ngModel)]="sampleSize" (ngModelChange)="refresh()" />
    </label>
    <label class="chip-label" style="cursor:pointer">
      <input type="checkbox" [(ngModel)]="showTrend" (ngModelChange)="refresh()" style="display:none">
      Show trend
    </label>
    <label>Search
      <input type="text" [(ngModel)]="search" (ngModelChange)="refresh()"
        placeholder="Track or artist" />
    </label>
  </div>
  <div #chart class="chart-container">
    @if (loadState.loading()) {
      <div class="chart-loading">{{ loadState.chartLoadingLabel() }}</div>
    }
  </div>
</section>
